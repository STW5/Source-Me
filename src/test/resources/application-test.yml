spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: test-secret-key-for-testing-purposes-only-32-chars-min
  expiration: 86400000

app:
  upload:
    dir: /tmp/test-uploads
    max-file-size: 10485760

logging:
  level:
    root: WARN
    com.stw.sourceme: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
